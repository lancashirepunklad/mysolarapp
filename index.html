<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLIX PRO | Berlin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bar-anim { transition: height 1s ease, background-color 0.4s ease; }
        .y-label { font-size: 9px; color: #475569; font-weight: 800; }
        .glow-white { box-shadow: 0 0 15px rgba(255,255,255,0.3); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 font-sans">
    <div class="max-w-md mx-auto bg-slate-900/90 backdrop-blur-2xl rounded-[3rem] shadow-2xl border border-white/10 pb-10 overflow-hidden">
        
        <div class="px-8 pt-10 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white leading-none">SOLIX <span class="text-blue-500">PRO</span></h1>
                <p class="text-slate-500 text-[10px] font-bold tracking-widest uppercase mt-2">Grüne Aue 74 • 1.82kWp • 246° W</p>
            </div>
            <div class="bg-black/40 px-4 py-2 rounded-2xl border border-white/5 text-center">
                <p class="text-[8px] font-black text-orange-500 uppercase tracking-tighter mb-1">Sunset</p>
                <p id="sunset-val" class="text-sm font-black text-white">--:--</p>
            </div>
        </div>

        <div class="mx-8 mb-6 p-4 bg-blue-600/10 rounded-2xl border border-blue-500/20 flex justify-between items-center">
            <span class="text-[10px] font-black uppercase tracking-widest text-blue-400">Tomorrow's Sunshine</span>
            <span class="text-xl font-black text-white">90%</span>
        </div>

        <div class="mx-8 mb-6 p-5 bg-white/5 rounded-[2rem] border border-white/5">
            <p class="text-[9px] uppercase font-black text-slate-500 mb-2 tracking-widest text-center">Active Energy Window</p>
            <div class="flex justify-between items-center px-4">
                <span class="text-xs font-bold text-slate-400 italic">Charge & Usage</span>
                <span id="solar-window" class="text-lg font-black text-blue-400 uppercase tracking-tighter">--:-- to --:--</span>
            </div>
        </div>

        <div class="px-8 grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white/5 p-5 rounded-[1.5rem] border border-white/5">
                <p class="text-[9px] uppercase font-black text-slate-500 mb-1 tracking-widest text-center">🧺 Best Wash</p>
                <p id="washer-win" class="text-xl font-bold text-green-400 text-center">--:--</p>
            </div>
            <div class="bg-white/5 p-5 rounded-[1.5rem] border border-white/5">
                <p class="text-[9px] uppercase font-black text-slate-500 mb-1 tracking-widest text-center">🍽️ Best Dish</p>
                <p id="dish-win" class="text-xl font-bold text-yellow-400 text-center">--:--</p>
            </div>
        </div>

        <div class="mx-6 p-8 rounded-[2.5rem] bg-black/40 border border-white/5">
            <div class="flex justify-between items-center mb-8">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Yield Projection (kWh)</span>
                <span class="text-[10px] font-bold text-blue-500 uppercase">1.82kWp Max</span>
            </div>

            <div class="flex h-44 relative">
                <div class="flex flex-col justify-between pr-4 border-r border-white/10 h-full">
                    <span class="y-label">2.0</span>
                    <span class="y-label">1.0</span>
                    <span class="y-label">0.0</span>
                </div>
                <div id="chart" class="flex-1 flex items-end justify-between pl-4 gap-1.5 h-full"></div>
            </div>

            <div id="labels" class="flex justify-between mt-5 pl-12 text-slate-600 font-black text-[10px]"></div>
            <div id="weather-strip" class="flex justify-between mt-3 pl-12 opacity-80"></div>
        </div>
    </div>

    <script>
        const LAT = 52.502, LON = 13.545, DEC = 35, AZ = 66, KWP = 1.82;

        async function updateApp() {
            try {
                const sunRes = await fetch(`https://api.sunrise-sunset.org/json?lat=${LAT}&lng=${LON}&formatted=0`);
                const sunData = await sunRes.json();
                const sunset = new Date(sunData.results.sunset);
                document.getElementById('sunset-val').innerText = sunset.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

                const solRes = await fetch(`https://api.forecast.solar/estimate/${LAT}/${LON}/${DEC}/${AZ}/${KWP}`);
                const solData = await solRes.json();
                const watts = solData.result.watts;

                const now = new Date();
                const currentH = now.getHours();
                
                const chart = document.getElementById('chart'), labels = document.getElementById('labels'), strip = document.getElementById('weather-strip');
                chart.innerHTML = ''; labels.innerHTML = ''; strip.innerHTML = '';

                const today = Object.entries(watts).filter(([t]) => {
                    const d = new Date(t);
                    return d.getDate() === now.getDate() && d.getHours() >= 6 && d.getHours() <= 21;
                });

                // Window Logic: Find hours where production is > 150W
                const activeHours = today.filter(e => e[1] > 150);
                if (activeHours.length > 0) {
                    const start = new Date(activeHours[0][0]).getHours();
                    const end = new Date(activeHours[activeHours.length - 1][0]).getHours();
                    document.getElementById('solar-window').innerText = `${start}:00 - ${end}:00`;
                }

                const peakE = today.reduce((p, c) => p[1] > c[1] ? p : c, [0,0]);
                const peakH = new Date(peakE[0]).getHours();

                today.forEach(([t, w]) => {
                    const h = new Date(t).getHours();
                    const isNow = h === currentH;

                    let color = h > currentH ? "bg-blue-600/30" : "bg-white/5";
                    if (isNow) color = "bg-white glow-white";
                    else if (h > currentH && (h >= peakH - 1 && h <= peakH + 1) && w > 800) color = "bg-emerald-500/80";

                    const bar = document.createElement('div');
                    bar.className = `bar-anim w-full rounded-t-sm ${color}`;
                    bar.style.height = `${Math.max((w/2000)*100, 4)}%`;
                    chart.appendChild(bar);

                    const lbl = document.createElement('span');
                    lbl.className = isNow ? "text-white" : "";
                    lbl.innerText = h;
                    labels.appendChild(lbl);

                    const icon = document.createElement('span');
                    icon.className = "text-[12px]";
                    icon.innerText = w > 1200 ? '☀️' : w > 500 ? '⛅' : '☁️';
                    strip.appendChild(icon);
                });

                document.getElementById('washer-win').innerText = `${peakH}:00`;
                document.getElementById('dish-win').innerText = `${peakH - 1}:00`;

            } catch (err) { console.error(err); }
        }

        updateApp();
        setInterval(updateApp, 600000);
    </script>
</body>
</html>
