<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andy's Solar Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6 font-sans">
    <div class="max-w-md mx-auto bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
        <div class="p-6">
            <h1 class="text-2xl font-bold mb-1">Grüne Aue 74</h1>
            <p class="text-slate-400 text-sm mb-6">4 Panels • SW Facing • 5kWh Battery</p>
            
            <div id="status" class="bg-blue-900/30 border border-blue-500/50 p-4 rounded-xl mb-6 text-center">
                Fetching Solar Forecast...
            </div>

            <div class="space-y-4">
                <div class="bg-slate-700/50 p-4 rounded-2xl">
                    <h2 class="text-xs uppercase tracking-widest text-slate-400 font-semibold mb-2">🧺 Washing Machine Window</h2>
                    <p id="washer-time" class="text-xl font-bold text-green-400">Calculating...</p>
                </div>

                <div class="bg-slate-700/50 p-4 rounded-2xl">
                    <h2 class="text-xs uppercase tracking-widest text-slate-400 font-semibold mb-2">🍽️ Dishwasher Window</h2>
                    <p id="dishwasher-time" class="text-xl font-bold text-yellow-400">Calculating...</p>
                </div>
            </div>

            <div class="mt-8">
                <h3 class="text-sm font-semibold mb-4">Hourly Solar Potential (Watts)</h3>
                <div id="chart" class="flex items-end gap-1 h-32">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // YOUR SPECIFIC CONFIGURATION
        const lat = 52.502; // Grüne Aue 74 Approx
        const lon = 13.545;
        const dec = 35;     // Roof pitch (estimate)
        const az = 45;      // 45 degrees West of South (South-West)
        const kwp = 1.6;    // 4 panels x 400W

        async function getSolarData() {
            const status = document.getElementById('status');
            try {
                const response = await fetch(`https://api.forecast.solar/estimate/${lat}/${lon}/${dec}/${az}/${kwp}`);
                const data = await response.json();
                const forecast = data.result.watts;

                // 1. Update Chart
                const chart = document.getElementById('chart');
                chart.innerHTML = '';
                const values = Object.values(forecast).slice(6, 20); // Focus 6am - 8pm
                const maxWatt = Math.max(...values);

                values.forEach(w => {
                    const bar = document.createElement('div');
                    bar.className = 'bg-blue-500 rounded-t-sm flex-1 transition-all duration-1000';
                    bar.style.height = `${(w / maxWatt) * 100}%`;
                    chart.appendChild(bar);
                });

                // 2. Calculate Recommendation
                // We look for the absolute highest peak for the Washer, 
                // and the second highest or earliest for the Dishwasher.
                const entries = Object.entries(forecast);
                const bestHour = entries.reduce((prev, curr) => prev[1] > curr[1] ? prev : curr);
                const peakTime = new Date(bestHour[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                document.getElementById('washer-time').innerText = `${peakTime} (Peak Output)`;
                document.getElementById('dishwasher-time').innerText = `13:00 - 15:00 (Battery Buffer)`;
                status.innerText = "Forecast Updated Successfully";
                status.className = "bg-green-900/30 border border-green-500/50 p-4 rounded-xl mb-6 text-center text-green-400";

            } catch (error) {
                status.innerText = "Error loading data. Check connection.";
                status.className = "bg-red-900/30 border border-red-500/50 p-4 rounded-xl mb-6 text-center text-red-400";
            }
        }

        getSolarData();
    </script>
</body>
</html>
