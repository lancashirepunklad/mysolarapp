<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLIX PRO | Glass Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0c10; }
        .bar-anim { transition: height 1s ease, background-color 0.4s ease; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        input[type=range] { height: 6px; -webkit-appearance: none; background: #1e293b; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: 3px solid #fff; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="text-white min-h-screen p-4 font-sans antialiased">
    <div class="max-w-md mx-auto pb-10">
        
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex items-center gap-3">
                <div id="status-dot" class="w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic text-blue-500">Solix <span class="text-white text-opacity-90">Pro</span></h1>
            </div>
            <button onclick="updateApp()" class="glass px-4 py-2 rounded-2xl text-[10px] font-bold tracking-widest text-slate-400">
                SYNC <span id="sunset-val">--:--</span>
            </button>
        </div>

        <div class="glass p-6 rounded-[2.5rem] mb-4 relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <p class="text-[10px] uppercase font-black text-slate-500 tracking-[0.2em]">Battery Storage</p>
                <span id="bat-pct" class="text-3xl font-black text-blue-400">50%</span>
            </div>
            <input type="range" id="bat-slider" min="0" max="100" value="50" oninput="updateBatteryUI()" class="w-full relative z-10">
            <div class="flex justify-between mt-3 text-[8px] font-bold text-slate-600 uppercase tracking-widest">
                <span>0% Empty</span>
                <span>100% Full</span>
            </div>
        </div>

        <div id="action-card" class="mb-4 p-8 rounded-[2.5rem] border transition-all duration-700 bg-white/5 border-white/5 shadow-2xl">
            <h2 id="action-title" class="text-2xl font-black mb-2 italic leading-tight uppercase">UPDATING...</h2>
            <p id="action-detail" class="text-sm font-medium opacity-60 leading-relaxed"></p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4 text-center">
            <div class="glass p-5 rounded-[2rem]">
                <p class="text-[9px] uppercase font-black text-slate-500 mb-1 tracking-widest">🧺 Best Wash</p>
                <p id="washer-win" class="text-xl font-black text-white">--:--</p>
            </div>
            <div class="glass p-5 rounded-[2rem]">
                <p class="text-[9px] uppercase font-black text-slate-500 mb-1 tracking-widest">🍽️ Best Dish</p>
                <p id="dish-win" class="text-xl font-black text-white">--:--</p>
            </div>
        </div>

        <div class="glass p-8 rounded-[3rem]">
            <div class="flex justify-between items-center mb-8">
                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500 italic">Today's Forecast</span>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                    <span class="text-[10px] font-bold text-slate-400">kWh Yield</span>
                </div>
            </div>
            <div class="flex h-36 relative">
                <div class="flex flex-col justify-between pr-4 border-r border-white/5 h-full font-bold text-[9px] text-slate-700">
                    <span>2.0</span><span>1.0</span><span>0.0</span>
                </div>
                <div id="chart" class="flex-1 flex items-end justify-between pl-4 gap-1.5 h-full"></div>
            </div>
            <div id="labels" class="flex justify-between mt-5 pl-12 text-slate-600 font-black text-[9px]"></div>
            <div id="weather-strip" class="flex justify-between mt-3 pl-12 opacity-60"></div>
        </div>

        <p class="text-center mt-10 text-[9px] font-bold text-slate-800 tracking-[0.4em] uppercase">Grüne Aue 74 • Berlin</p>
    </div>

    <script>
        const CONFIG = { LAT: 52.502, LON: 13.545, DEC: 35, AZ: 66, KWP: 1.82 };
        let currentWatts = 0;
        let peakHour = 15;

        function updateBatteryUI() {
            const val = document.getElementById('bat-slider').value;
            document.getElementById('bat-pct').innerText = val + "%";
            processLogic(val, currentWatts, peakHour);
        }

        async function updateApp() {
            try {
                const solRes = await fetch(`https://api.forecast.solar/estimate/${CONFIG.LAT}/${CONFIG.LON}/${CONFIG.DEC}/${CONFIG.AZ}/${CONFIG.KWP}`);
                const sunRes = await fetch(`https://api.sunrise-sunset.org/json?lat=${CONFIG.LAT}&lng=${CONFIG.LON}&formatted=0`);
                
                const solData = await solRes.json();
                const sunData = await sunRes.json();
                const watts = solData.result.watts;
                const sunset = new Date(sunData.results.sunset);
                const now = new Date();
                const currentH = now.getHours();

                document.getElementById('sunset-val').innerText = sunset.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

                const chart = document.getElementById('chart'), labels = document.getElementById('labels'), strip = document.getElementById('weather-strip');
                chart.innerHTML = ''; labels.innerHTML = ''; strip.innerHTML = '';

                const todayHours = Object.entries(watts).filter(([t]) => {
                    const d = new Date(t);
                    return d.getDate() === now.getDate() && d.getHours() >= 6 && d.getHours() <= 21;
                });

                const peakE = todayHours.reduce((p, c) => p[1] > c[1] ? p : c, [0,0]);
                peakHour = new Date(peakE[0]).getHours();
                currentWatts = watts[Object.keys(watts).find(k => new Date(k).getHours() === currentH)] || 0;

                todayHours.forEach(([t, w]) => {
                    const h = new Date(t).getHours();
                    const isNow = h === currentH;
                    let color = h > currentH ? "bg-blue-600/20" : "bg-white/5";
                    if (isNow) color = "bg-white shadow-[0_0_20px_rgba(255,255,255,0.2)]";
                    else if (h > currentH && h >= peakHour - 1 && h <= peakHour + 1 && w > 800) color = "bg-emerald-500/80";

                    const bar = document.createElement('div');
                    bar.className = `bar-anim w-full rounded-t-lg ${color}`;
                    bar.style.height = `${Math.max((w/2000)*100, 5)}%`;
                    chart.appendChild(bar);

                    const lbl = document.createElement('span');
                    lbl.className = isNow ? "text-white" : "";
                    lbl.innerText = h;
                    labels.appendChild(lbl);

                    const icon = document.createElement('span');
                    icon.className = "text-[10px]";
                    icon.innerText = w > 1400 ? '☀️' : w > 600 ? '⛅' : '☁️';
                    strip.appendChild(icon);
                });

                updateBatteryUI();

            } catch (err) { console.error(err); }
        }

        function processLogic(battery, sun, peak) {
            const card = document.getElementById('action-card');
            const title = document.getElementById('action-title');
            const detail = document.getElementById('action-detail');

            if (battery < 25) {
                title.innerText = "CRITICAL CHARGE";
                detail.innerText = "Battery low. Suspend large appliances to allow Solarbank recovery.";
                card.className = "mb-4 p-8 rounded-[2.5rem] border bg-red-900/30 border-red-500/40";
            } else if (sun > 1300) {
                title.innerText = "RUN LARGE LOADS";
                detail.innerText = `Power is high (${sun}W). Best window for laundry or heavy appliances.`;
                card.className = "mb-4 p-8 rounded-[2.5rem] border bg-emerald-900/30 border-emerald-500/40";
            } else if (sun > 750) {
                title.innerText = "OPTIMAL WINDOW";
                detail.innerText = "System stable. Safe for dishwasher or light chores.";
                card.className = "mb-4 p-8 rounded-[2.5rem] border bg-blue-900/30 border-blue-500/40";
            } else {
                title.innerText = "CHARGE BATTERY";
                detail.innerText = "Yield is low. Focus on storing energy for evening use.";
                card.className = "mb-4 p-8 rounded-[2.5rem] border bg-white/5 border-white/5";
            }

            document.getElementById('washer-win').innerText = `${peak}:00`;
            document.getElementById('dish-win').innerText = `${peak - 1}:00`;
        }

        updateApp();
    </script>
</body>
</html>
